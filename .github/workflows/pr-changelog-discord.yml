name: "PR Changelog: Discord"

on:
  workflow_run:
    workflows: ["PR Changelogs"]
    types: [completed]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.workflow_run.id }}
  cancel-in-progress: false

jobs:
  notify:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Resolve PR number
        id: pr
        run: |
          pr_number="$(jq -r '.workflow_run.pull_requests[0].number // empty' "$GITHUB_EVENT_PATH")"
          if [ -z "$pr_number" ]; then
            title="$(jq -r '.workflow_run.display_title // empty' "$GITHUB_EVENT_PATH")"
            pr_number="$(printf '%s' "$title" | sed -n 's/.*#\([0-9][0-9]*\)$/\1/p')"
          fi

          if [ -z "$pr_number" ]; then
            echo "Could not resolve PR number from workflow_run payload, skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "number=$pr_number" >> "$GITHUB_OUTPUT"

      - name: Checkout base branch
        if: steps.pr.outputs.skip != 'true'
        uses: actions/checkout@v4.2.2
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Setup Python
        if: steps.pr.outputs.skip != 'true'
        uses: actions/setup-python@v5.3.0
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        if: steps.pr.outputs.skip != 'true'
        run: |
          python -m pip install --upgrade pip
          pip install requests pyyaml

      - name: Publish changelog delta (Discord)
        if: steps.pr.outputs.skip != 'true'
        run: python3 Tools/actions_pr_changelog_to_discord.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DISCORD_WEBHOOK_URL: ${{ secrets.CHANGELOG_PR_DISCORD_WEBHOOK }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          CHANGELOG_DIR: Resources/Changelog
          CHANGELOG_EXT: .yml
          # Optional tuning:
          DISCORD_MESSAGE_DELAY_SECONDS: "2.0"
