- type: entity
  id: BaseFoodCondimentBottleSyrupPirate
  abstract: true
  parent: BaseFoodCondimentBottle
  components:
  - type: SolutionContainerManager
    solutions:
      food:
        maxVol: 50
  - type: SolutionTransfer
    canChangeTransferAmount: true
    minTransferAmount: 5
    maxTransferAmount: 10
  - type: Sprite
    layers:
    - state: bottle-empty
      map: ["enum.OpenableVisuals.Layer"]
    - state: label-b
    - state: bottle-alpha-6
      map: ["enum.SolutionContainerLayers.Fill"]
      visible: true
  - type: Item
    sprite: Objects/Consumable/Food/condiments.rsi
  - type: Icon
    state: bottle-empty

- type: entity
  id: FoodCondimentBottleCaramelSyrupPirate
  parent: BaseFoodCondimentBottleSyrupPirate
  name: caramel syrup bottle
  description: A pump bottle containing caramelized sugar, also known as caramel. Do not lick.
  components:
  - type: SolutionContainerManager
    solutions:
      food:
        reagents:
        - ReagentId: Syrup
          Quantity: 50
  - type: Sprite
    layers:
    - state: bottle-empty
      map: ["enum.OpenableVisuals.Layer"]
    - state: label-b
    - state: bottle-alpha-6
      map: ["enum.SolutionContainerLayers.Fill"]
      visible: true

